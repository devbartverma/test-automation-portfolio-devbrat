name: Java (Spock)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Java (Groovy + Spock)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Install Playwright browsers
        run: >
          mvn -B compile
          org.codehaus.mojo:exec-maven-plugin:3.1.0:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"
      - run: mvn -B test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-java
          path: java-automation/target/screenshots
          retention-days: 7
