name: Python (pytest)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - run: pytest -n auto
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-python
          path: python-automation/screenshots
          retention-days: 7
